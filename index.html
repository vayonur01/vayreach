<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>VayReach | Ultimate Edition</title>
    <link href="favicon.jpg" rel="icon" type="image/jpeg"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glow-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, #111 0%, #050505 100%);
            z-index: -1;
        }

        .glass-nav {
            backdrop-filter: blur(20px);
            background: rgba(0, 0, 0, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .premium-text {
            background: linear-gradient(180deg, #FFFFFF 40%, #666666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.4s;
        }
        .glass-card:hover { border-color: rgba(255, 255, 255, 0.1); transform: translateY(-5px); }

        /* BİLDİRİM SİSTEMİ */
        #notification-container { position: fixed; top: 100px; right: 20px; z-index: 9999; }
        .notification {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 10px;
            transform: translateX(150%);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; align-items: center; gap: 12px;
        }
        .notification.show { transform: translateX(0); }

        /* MODAL & VIDEO */
        .info-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(25px); display: none; justify-content: center;
            align-items: center; z-index: 1000; opacity: 0; transition: 0.3s;
        }
        .info-overlay.active { display: flex; opacity: 1; }
        .info-box {
            background: #0c0c0c; border: 1px solid rgba(255,255,255,0.1);
            padding: 40px; border-radius: 30px; max-width: 650px; width: 95%;
            text-align: center; transform: scale(0.9); transition: 0.4s;
        }
        .info-overlay.active .info-box { transform: scale(1); }

        .video-container {
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
            border-radius: 15px; margin: 20px 0; background: #000;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* SPOTIFY PLAYER */
        .spotify-player {
            position: fixed; bottom: 20px; left: 20px;
            background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 20px;
            border-radius: 16px; display: flex; align-items: center; gap: 15px;
            z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .play-btn { width: 40px; height: 40px; background: #1DB954; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; cursor: pointer; }
        input[type=range] { width: 80px; accent-color: #1DB954; cursor: pointer; }

        /* SAYFA GEÇİŞLERİ */
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div id="notification-container"></div>

    <div class="spotify-player">
        <div class="play-btn" id="masterPlay"><i class="fas fa-play" id="playIcon"></i></div>
        <div class="track-info">
            <span class="block text-sm font-bold text-white">VayOnur Theme</span>
            <span class="text-xs text-zinc-500">Official Music</span>
        </div>
        <div class="flex items-center gap-2 ml-2 border-l border-white/10 pl-4">
            <i class="fas fa-volume-up text-zinc-500 text-[10px]"></i>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
        </div>
    </div>
    <audio id="bgMusic" loop><source src="ses.mp3" type="audio/mpeg"></audio>

    <nav class="glass-nav fixed top-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="cursor-pointer" onclick="showPage('home')">
                <span class="font-extrabold text-2xl tracking-tighter uppercase">VayOnur<span class="text-zinc-500">|sex Edıtıons</span></span>
            </div>
            <div class="hidden md:flex items-center gap-10 text-[11px] font-bold uppercase tracking-[0.2em]">
                <a href="javascript:void(0)" onclick="showPage('home')" id="nav-home" class="nav-link text-white transition">Anasayfa</a>
                <a href="javascript:void(0)" onclick="showPage('products')" id="nav-products" class="nav-link text-zinc-500 hover:text-white transition">Ürünler</a>
                <a href="javascript:void(0)" onclick="showPage('terms')" id="nav-terms" class="nav-link text-zinc-500 hover:text-white transition">Koşullar</a>
                <a href="https://discord.gg/TwM53AMCh7" target="_blank" class="bg-white text-black px-6 py-2 rounded-full hover:bg-zinc-200 transition">Discord</a>
            </div>
        </div>
    </nav>

    <!-- Sayfa ve modal içerikleri burada (mevcut kodunuz) -->

    <script>
        // Sağ tıklamayı sessizce engelle
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Sayfa Değiştirme Fonksiyonu
        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('text-white');
                link.classList.add('text-zinc-500');
            });
            const activeNav = document.getElementById('nav-' + pageId);
            if(activeNav) {
                activeNav.classList.remove('text-zinc-500');
                activeNav.classList.add('text-white');
            }
            window.scrollTo(0,0);
        }

        // Müzik kontrol, bildirim ve modal yönetimi mevcut kodunuzda olduğu gibi devam eder.
    </script>
</body>
</html>
