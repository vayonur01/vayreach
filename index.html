<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VAYONUR Kullanıcılar</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #fff;
            font-family: Consolas, monospace;
            padding: 20px;
        }
        h1 {
            color: #00ff99;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #777;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #111111;
            color: #00ff99;
        }
        tr:nth-child(even) {
            background-color: #1a1a1a;
        }
        tr:nth-child(odd) {
            background-color: #111111;
        }
        td.banned {
            color: #ff0033;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>VAYONUR LAUNCHER Kullanıcılar</h1>

    <table id="usersTable">
        <tr>
            <th>Bilgisayar</th>
            <th>Kod</th>
            <th>Süre</th>
            <th>Son Giriş</th>
            <th>Banlı mı?</th>
        </tr>
    </table>

    <!-- Firebase JS (modüler v9) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // Firebase ayarları (Python launcher ile aynı proje)
        const firebaseConfig = {
            apiKey: "AIzaSyDF3tw3ukW6gjTDEhj_Gz4D1qgB-WB5BU8",
            authDomain: "hwid-8fb7e.firebaseapp.com",
            projectId: "hwid-8fb7e",
            storageBucket: "hwid-8fb7e.firebasestorage.app",
            messagingSenderId: "99269272565",
            appId: "1:99269272565:web:1fed96706775c81f7436bc",
            measurementId: "G-WV3585JPKE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Kullanıcıları çekip tabloya ekle
        async function loadUsers() {
            const table = document.getElementById("usersTable");
            const usersCol = collection(db, "users");
            const q = query(usersCol, orderBy("last_login", "desc"));

            try {
                const snapshot = await getDocs(q);
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const row = table.insertRow();
                    row.insertCell(0).innerText = doc.id; // Bilgisayar adı
                    row.insertCell(1).innerText = data.code;
                    row.insertCell(2).innerText = data.duration === Infinity ? "UNLIMITED" : data.duration + " saat";
                    row.insertCell(3).innerText = data.last_login;
                    const banCell = row.insertCell(4);
                    banCell.innerText = data.banned ? "EVET" : "HAYIR";
                    if(data.banned) banCell.classList.add("banned");
                });
            } catch(err) {
                console.error("Veri çekilemedi:", err);
            }
        }

        // Tabloyu temizleyip tekrar yükle
        async function refreshTable() {
            const table = document.getElementById("usersTable");
            while(table.rows.length > 1) table.deleteRow(1); // başlık satırı hariç
            await loadUsers();
        }

        // Sayfa yüklendiğinde tabloyu doldur
        window.onload = refreshTable;

        // 30 saniyede bir tabloyu güncelle
        setInterval(refreshTable, 30000);
    </script>
</body>
</html>
