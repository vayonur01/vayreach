<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VayReach | Ultimate Edition</title>
<link href="favicon.jpg" rel="icon" type="image/jpeg"/>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

body{
font-family:'Plus Jakarta Sans',sans-serif;
background-color:#050505;
color:white;
overflow-x:hidden;
min-height:100vh;
user-select:none;
}

.glow-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at 50% 30%,#111 0%,#050505 100%);
z-index:-1;
}

.glass-nav{
backdrop-filter:blur(20px);
background:rgba(0,0,0,0.6);
border-bottom:1px solid rgba(255,255,255,0.05);
}

.premium-text{
background:linear-gradient(180deg,#fff 40%,#666 100%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.glass-card{
background:rgba(255,255,255,0.02);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.05);
transition:0.4s;
}

.glass-card:hover{
border-color:rgba(255,255,255,0.1);
transform:translateY(-5px);
}

#notification-container{
position:fixed;
top:100px;
right:20px;
z-index:9999;
}

.notification{
background:rgba(255,255,255,0.03);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
padding:15px 25px;
border-radius:15px;
margin-bottom:10px;
transform:translateX(150%);
transition:transform 0.6s cubic-bezier(0.16,1,0.3,1);
display:flex;
align-items:center;
gap:12px;
}

.notification.show{
transform:translateX(0);
}

.info-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
backdrop-filter:blur(25px);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
opacity:0;
transition:0.3s;
}

.info-overlay.active{
display:flex;
opacity:1;
}

.info-box{
background:#0c0c0c;
border:1px solid rgba(255,255,255,0.1);
padding:40px;
border-radius:30px;
max-width:650px;
width:95%;
text-align:center;
transform:scale(0.9);
transition:0.4s;
}

.info-overlay.active .info-box{
transform:scale(1);
}

.video-container{
position:relative;
padding-bottom:56.25%;
height:0;
overflow:hidden;
border-radius:15px;
margin:20px 0;
background:#000;
border:1px solid rgba(255,255,255,0.1);
}

.video-container iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

.spotify-player{
position:fixed;
bottom:20px;
left:20px;
background:rgba(18,18,18,0.8);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
padding:12px 20px;
border-radius:16px;
display:flex;
align-items:center;
gap:15px;
z-index:9999;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.play-btn{
width:40px;
height:40px;
background:#1DB954;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:black;
cursor:pointer;
}

input[type=range]{
width:80px;
accent-color:#1DB954;
cursor:pointer;
}

.page-section{
display:none;
}

.page-section.active{
display:block;
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="glow-bg"></div>
<div id="notification-container"></div>

<div class="spotify-player">
<div class="play-btn" id="masterPlay"><i class="fas fa-play" id="playIcon"></i></div>

<div class="track-info">
<span class="block text-sm font-bold text-white">VayOnur Theme</span>
<span class="text-xs text-zinc-500">Official Music</span>
</div>

<div class="flex items-center gap-2 ml-2 border-l border-white/10 pl-4">
<i class="fas fa-volume-up text-zinc-500 text-[10px]"></i>
<input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
</div>
</div>

<audio id="bgMusic" loop>
<source src="ses.mp3" type="audio/mpeg">
</audio>

<script>

document.addEventListener('contextmenu', e=>e.preventDefault());

document.addEventListener('keydown', e=>{
if(
(e.ctrlKey && ['c','x','a','u'].includes(e.key.toLowerCase())) ||
e.key==='F12' ||
(e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase()))
){
e.preventDefault();
}
});

document.addEventListener('selectstart', e=>e.preventDefault());

const music=document.getElementById('bgMusic');
const masterPlay=document.getElementById('masterPlay');
const playIcon=document.getElementById('playIcon');
const volumeSlider=document.getElementById('volumeSlider');

masterPlay.addEventListener('click', ()=>{
if(music.paused){
music.play();
playIcon.classList.replace('fa-play','fa-pause');
}else{
music.pause();
playIcon.classList.replace('fa-pause','fa-play');
}
});

volumeSlider.addEventListener('input', e=>{
music.volume=e.target.value;
});

const messages=[
{icon:'fa-discord',text:'https://discord.gg/HPxQYkWeB7',color:'#5865F2'},
{icon:'fa-youtube',text:'youtube.com/@vayonur',color:'#FF0000'}
];

let currentIndex=0;

function showNotification(){

const container=document.getElementById('notification-container');

const data=messages[currentIndex];

const notif=document.createElement('div');

notif.className='notification text-white';

notif.innerHTML = `<i class="fa-brands ${data.icon} text-xl" style="color:${data.color}"></i>
<span class="font-bold text-sm">${data.text}</span>`;

container.appendChild(notif);

setTimeout(()=>notif.classList.add('show'),100);

setTimeout(()=>{
notif.classList.remove('show');
setTimeout(()=>notif.remove(),600);
},5000);

currentIndex=(currentIndex+1)%messages.length;
}

setTimeout(showNotification,2000);
setInterval(showNotification,12000);

</script>

</body>
</html>
